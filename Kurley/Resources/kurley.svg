<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Subtle dark gradient: deeper black at edges, slight lift in centre -->
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="60%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Top edge highlight -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Waveform gradient -->
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#5ba8ff"/>
      <stop offset="100%" stop-color="#b265ff"/>
    </linearGradient>

    <!-- Bracket gradient: subtle off-white -->
    <linearGradient id="bracket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8e0"/>
    </linearGradient>

    <!-- Soft glow for waveform bars -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#topShine)"/>

  <!-- Inner border highlight -->
  <rect x="2" y="2" width="508" height="508" rx="110"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Left curly brace { -->
  <path d="M 140 140
           C 100 140 100 200 100 230
           C 100 250 90 256 70 256
           C 90 256 100 262 100 282
           C 100 312 100 372 140 372"
        stroke="url(#bracket)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right curly brace } -->
  <path d="M 372 140
           C 412 140 412 200 412 230
           C 412 250 422 256 442 256
           C 422 256 412 262 412 282
           C 412 312 412 372 372 372"
        stroke="url(#bracket)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Waveform bars with glow -->
  <g fill="url(#wave)" filter="url(#glow)">
    <rect x="166" y="220" width="16" height="72"  rx="6"/>
    <rect x="194" y="188" width="16" height="136" rx="6"/>
    <rect x="222" y="160" width="16" height="192" rx="6"/>
    <rect x="250" y="132" width="16" height="248" rx="6"/>
    <rect x="278" y="160" width="16" height="192" rx="6"/>
    <rect x="306" y="188" width="16" height="136" rx="6"/>
    <rect x="334" y="220" width="16" height="72"  rx="6"/>
  </g>
</svg>
