<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Subtle dark gradient: deeper black at edges, slight lift in centre -->
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="60%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Top edge highlight -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- GRB sweep across the braced M: green, red, blue -->
    <linearGradient id="grb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2bd46a"/>
      <stop offset="50%"  stop-color="#ff3b3b"/>
      <stop offset="100%" stop-color="#3b8bff"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Top shine overlay -->
  <rect width="512" height="512" rx="112" fill="url(#topShine)"/>

  <!-- Inner border highlight -->
  <rect x="2" y="2" width="508" height="508" rx="110"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Braced M: brace prongs curl out at the sides, sharp M valley at the top -->
  <path fill="none" stroke="url(#grb)" stroke-width="42"
        stroke-linecap="round" stroke-linejoin="round"
        d="M 97 340 C 181 328 181 316 181 292 L 181 175
           C 181 162 193 154 207 159 C 220 163 229 178 229 199
           L 256 358 L 283 199
           C 283 178 292 163 306 159 C 319 154 331 162 331 175 L 331 292
           C 331 316 346 328 415 340"/>
</svg>
